# Tenant-isolation fixture infrastructure: Neo4j Enterprise under its
# evaluation license acceptance, on the disposable harness only
# (ADR-0007). The tenant isolation matrix graph floor is one native
# database per tenant, an enterprise feature; scenario SDN-B15-007
# needs it live. Credentials arrive from the per-run neo4j-auth
# Secret; no password lives in this file. Commercial licensing is a
# Batch 25 release-gate concern.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: evidence-backend
  labels:
    app: neo4j
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      # Kubelet service links would inject NEO4J_PORT_* env vars from
      # the neo4j Service, which the image entrypoint misparses as
      # config settings (strict validation aborts). Disable them.
      enableServiceLinks: false
      containers:
        - name: neo4j
          image: neo4j:5.26.0-enterprise
          env:
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: eval
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-auth
                  key: auth
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1536Mi
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: evidence-backend
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
