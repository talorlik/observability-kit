# In-cluster git server serving the disposable GitOps clone to
# Argo CD over HTTPS (ADR-0007). The install contract schema requires
# an https:// (or git@) gitops_repo_url, so the harness serves the
# bare repository over TLS with a per-run self-signed certificate
# (Secret git-server-tls, created by the harness) and registers a
# declarative Argo CD repository secret with insecure: "true".
#
# The server is a Python stdlib static HTTPS server over the bare
# repo (git "dumb" HTTP protocol; the harness runs
# `git update-server-info` before shipping the repo with kubectl cp).
# Read-only, anonymous, disposable - exactly the lifetime of the
# evidence cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-server
  namespace: evidence-gitops
  labels:
    app: git-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: git-server
  template:
    metadata:
      labels:
        app: git-server
    spec:
      containers:
        - name: git-https
          image: python:3.12-alpine
          command:
            - python3
            - -c
            - |
              import http.server
              import os
              import ssl

              os.makedirs("/repos", exist_ok=True)
              os.chdir("/repos")
              httpd = http.server.HTTPServer(
                  ("0.0.0.0", 8443),
                  http.server.SimpleHTTPRequestHandler,
              )
              context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
              context.load_cert_chain(
                  "/certs/tls.crt", "/certs/tls.key"
              )
              httpd.socket = context.wrap_socket(
                  httpd.socket, server_side=True
              )
              httpd.serve_forever()
          ports:
            - containerPort: 8443
              name: https
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: repos
              mountPath: /repos
            - name: tls
              mountPath: /certs
              readOnly: true
      volumes:
        - name: repos
          emptyDir: {}
        - name: tls
          secret:
            secretName: git-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: git-server
  namespace: evidence-gitops
spec:
  selector:
    app: git-server
  ports:
    - name: https
      port: 8443
      targetPort: 8443
