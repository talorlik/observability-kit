# Attached backend: single-node OpenSearch with the security plugin
# active, plus Dashboards. Harness test infrastructure simulating a
# provider-managed attach-mode backend (ADR-0007); never product
# delivery. Credentials arrive from per-run Secrets created by the
# harness (opensearch-admin); no password lives in this file.
#
# Pins are harness-scoped (see
# contracts/evidence/DISPOSABLE_CLUSTER_HARNESS_CONTRACT_V1.yaml);
# they do not resolve the wrapped-system registry's to-be-pinned
# entries.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: evidence-backend
  labels:
    app: opensearch
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.1
          env:
            - name: discovery.type
              value: single-node
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: path.repo
              value: /usr/share/opensearch/snapshots
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-admin
                  key: password
          ports:
            - containerPort: 9200
              name: rest
            - containerPort: 9600
              name: metrics
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: snapshots
              mountPath: /usr/share/opensearch/snapshots
      volumes:
        - name: data
          emptyDir: {}
        - name: snapshots
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: evidence-backend
spec:
  selector:
    app: opensearch
  ports:
    - name: rest
      port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: evidence-backend
  labels:
    app: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
        - name: dashboards
          image: opensearchproject/opensearch-dashboards:2.19.1
          env:
            - name: OPENSEARCH_HOSTS
              value: '["https://opensearch:9200"]'
            - name: OPENSEARCH_SSL_VERIFICATIONMODE
              value: none
          ports:
            - containerPort: 5601
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 5601
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: evidence-backend
spec:
  selector:
    app: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
