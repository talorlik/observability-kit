feature_set_version: "2026.04.07"
determinism:
  random_seed: 4242
  windowing_rules_version: "1.0.0"
  scoring_weights_version: "1.0.0"
features:
  - name: incident_frequency_30d
    source: opensearch
    deterministic: true
    window: 30d
    calculation: count(incidents where service == target_service and timestamp >= now-30d)
  - name: dependency_blast_radius_score
    source: neo4j
    deterministic: true
    window: snapshot
    calculation: normalized(outbound_service_dependency_count + critical_path_weight)
  - name: error_budget_burn_rate_6h
    source: opensearch
    deterministic: true
    window: 6h
    calculation: sli_error_budget_consumed_percent over rolling 6h window
  - name: change_failure_rate_14d
    source: opensearch
    deterministic: true
    window: 14d
    calculation: failed_change_events / total_change_events over rolling 14d
