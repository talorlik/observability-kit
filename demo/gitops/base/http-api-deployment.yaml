# Demo HTTP API service (Batch 27, TR-27, ADR-0011).
# Emits logs, metrics, and traces as OTLP/HTTP JSON to the platform
# gateway collector; never writes to OpenSearch or Neo4j directly.
# The service.name / deployment.environment / service.owner labels
# satisfy the Batch 7 onboarding admission policy
# (gitops/platform/security/kyverno/onboarding-metadata-policy.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-http-api
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: demo-http-api
    app.kubernetes.io/part-of: obskit-demo
    service.name: demo-http-api
    deployment.environment: dev
    service.owner: team-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-http-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-http-api
        app.kubernetes.io/part-of: obskit-demo
        service.name: demo-http-api
        deployment.environment: dev
        service.owner: team-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: http-api
          # Product-owned demo image (ADR-0011); built locally on the
          # harness and side-loaded with `kind load docker-image`.
          image: ghcr.io/obskit/demo:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - http-api
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          # ADR-0011 sizing budget: requests <= 100m / 128Mi per pod.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            # Explicit endpoint so operators can retarget the
            # collector without an image rebuild.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-gateway.observability.svc.cluster.local:4318
            - name: DEMO_ENVIRONMENT
              value: dev
            - name: DEMO_OWNER
              value: team-demo
            # Tenant routing attribute stamped on every export
            # (contracts/tenancy/TENANT_ISOLATION_MATRIX_V1.yaml).
            - name: DEMO_TENANT_ID
              value: demo
            - name: DEMO_DATASTORE_URL
              value: http://demo-datastore:8081
---
apiVersion: v1
kind: Service
metadata:
  name: demo-http-api
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: demo-http-api
    app.kubernetes.io/part-of: obskit-demo
spec:
  selector:
    app.kubernetes.io/name: demo-http-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
