# Demo datastore-backed service (Batch 27, TR-27, ADR-0011).
# SQLite in-pod (ADR-0011 decision 4): genuine db.* client spans
# without a database pod. Telemetry goes through the platform gateway
# collector only; the SQLite file lives on the container filesystem
# and is disposable demo state.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-datastore
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: demo-datastore
    app.kubernetes.io/part-of: obskit-demo
    service.name: demo-datastore
    deployment.environment: dev
    service.owner: team-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-datastore
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-datastore
        app.kubernetes.io/part-of: obskit-demo
        service.name: demo-datastore
        deployment.environment: dev
        service.owner: team-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: datastore
          image: ghcr.io/obskit/demo:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - datastore
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          # ADR-0011 sizing budget: requests <= 100m / 128Mi per pod.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-gateway.observability.svc.cluster.local:4318
            - name: DEMO_ENVIRONMENT
              value: dev
            - name: DEMO_OWNER
              value: team-demo
            - name: DEMO_TENANT_ID
              value: demo
            - name: DEMO_DB_PATH
              value: /tmp/demo.db
            - name: DEMO_HTTP_PORT
              value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-datastore
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: demo-datastore
    app.kubernetes.io/part-of: obskit-demo
spec:
  selector:
    app.kubernetes.io/name: demo-datastore
  ports:
    - name: http
      port: 8081
      targetPort: 8081
