# Demo scheduled job (Batch 27, TR-27, ADR-0011).
# Run-to-completion batch every five minutes: each run is a new root
# trace with CLIENT-span checks against the demo HTTP API, a
# demo.job.runs counter, and a summary log. Always exits 0 - a
# degraded run is telemetry for the risk/RCA surfaces, not a page.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-scheduled-job
  namespace: tenant-demo
  labels:
    app.kubernetes.io/name: demo-scheduled-job
    app.kubernetes.io/part-of: obskit-demo
    service.name: demo-scheduled-job
    deployment.environment: dev
    service.owner: team-demo
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: demo-scheduled-job
        app.kubernetes.io/part-of: obskit-demo
        service.name: demo-scheduled-job
        deployment.environment: dev
        service.owner: team-demo
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: demo-scheduled-job
            app.kubernetes.io/part-of: obskit-demo
            service.name: demo-scheduled-job
            deployment.environment: dev
            service.owner: team-demo
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scheduled-job
              image: ghcr.io/obskit/demo:0.1.0
              imagePullPolicy: IfNotPresent
              args:
                - scheduled-job
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              # ADR-0011 sizing budget: requests <= 100m / 128Mi.
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: >-
                    http://otel-gateway.observability.svc.cluster.local:4318
                - name: DEMO_ENVIRONMENT
                  value: dev
                - name: DEMO_OWNER
                  value: team-demo
                - name: DEMO_TENANT_ID
                  value: demo
                - name: DEMO_HTTP_API_URL
                  value: http://demo-http-api:8080
