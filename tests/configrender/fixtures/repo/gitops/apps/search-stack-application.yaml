apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: search-stack
  namespace: argocd
  labels:
    app.kubernetes.io/component: search
spec:
  project: default
  source:
    repoURL: https://github.com/example/observability-kit.git
    targetRevision: main
    path: gitops/platform/search
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
