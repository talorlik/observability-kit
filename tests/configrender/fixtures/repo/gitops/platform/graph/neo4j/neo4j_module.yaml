apiVersion: v1
kind: Namespace
metadata:
  name: observability-graph
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: observability-kit
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: observability-graph
  labels:
    app.kubernetes.io/name: neo4j
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            # Credentials are sourced from the graph-neo4j-auth Secret,
            # provisioned by the selected secrets backend adapter. The
            # NEO4J_AUTH key holds the "<username>/<password>" string the
            # container consumes. The same Secret carries username and
            # password keys for sync jobs, matching the secret refs in
            # contracts/graph/GRAPH_MODULE_PROFILE_VALIDATION.json.
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: graph-neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
