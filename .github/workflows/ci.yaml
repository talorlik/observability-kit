name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-validate:
    name: Lint, Template, and Policy Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Python virtual environment
        run: bash scripts/ci/setup_python_env.sh

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Markdown lint
        run: bash scripts/ci/validate_markdown.sh

      - name: YAML lint
        run: bash scripts/ci/validate_yaml.sh

      - name: Stub render checks
        run: bash scripts/ci/validate_stub_renders.sh

      - name: Seeded rejection checks
        run: bash scripts/ci/validate_seeded_rejection_checks.sh

      - name: Helm lint
        run: helm lint gitops/charts/platform-core

      - name: Helm template render
        run: helm template platform-core gitops/charts/platform-core

      - name: Install contract schema checks
        run: bash scripts/ci/validate_install_contract.sh

      - name: AI boundary and protocol contract checks
        run: bash scripts/ci/validate_ai_boundary_contracts.sh

      - name: Compatibility and mode checks
        run: bash scripts/ci/validate_compatibility_and_modes.sh

      - name: AI governance contract checks
        run: bash scripts/ci/validate_ai_governance_contracts.sh

      - name: AI shared state and envelope contract checks
        run: bash scripts/ci/validate_ai_state_contracts.sh

      - name: MCP catalog and tool contract checks
        run: bash scripts/ci/validate_mcp_contracts.sh

      - name: AI runtime base scaffolding checks
        run: bash scripts/ci/validate_ai_runtime_base_scaffolding.sh

      - name: MCP read-path scaffolding checks
        run: bash scripts/ci/validate_mcp_read_path_scaffolding.sh

      - name: Multi-agent scaffolding checks
        run: bash scripts/ci/validate_multi_agent_scaffolding.sh

      - name: Khook trigger scaffolding checks
        run: bash scripts/ci/validate_khook_trigger_scaffolding.sh

      - name: Approval-gated action scaffolding checks
        run: bash scripts/ci/validate_action_gate_scaffolding.sh

      - name: Kagent Khook release scaffolding checks
        run: bash scripts/ci/validate_kagent_khook_release.sh

      - name: Preflight and discovery checks
        run: bash scripts/ci/validate_preflight_and_discovery.sh

      - name: Collector core topology checks
        run: bash scripts/ci/validate_collector_core_topology.sh

      - name: Logs pipeline checks
        run: bash scripts/ci/validate_logs_pipeline.sh

      - name: Metrics and traces pipeline checks
        run: bash scripts/ci/validate_metrics_traces_pipeline.sh

      - name: Onboarding and subscription checks
        run: bash scripts/ci/validate_onboarding_subscription.sh

      - name: Security, isolation, and resilience checks
        run: bash scripts/ci/validate_security_isolation_resilience.sh

      - name: Operator experience and SLO operations checks
        run: bash scripts/ci/validate_operator_experience_slo.sh

      - name: Visualization and admin access plane checks
        run: bash scripts/ci/validate_visualization_admin_access.sh

      - name: Vector foundations checks
        run: bash scripts/ci/validate_vector_foundations.sh

      - name: Graph foundation checks
        run: bash scripts/ci/validate_graph_foundation.sh

      - name: Risk scoring and assisted RCA readiness checks
        run: bash scripts/ci/validate_risk_scoring_assisted_rca.sh

      - name: GitOps structure checks
        run: bash scripts/ci/validate_gitops_structure.sh

      - name: No hard-coded environment values check
        run: bash scripts/ci/check_no_hardcoded_env_values.sh

      - name: Runbook baseline checks
        run: bash scripts/ci/validate_runbook_links.sh

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect --source=/repo --verbose
