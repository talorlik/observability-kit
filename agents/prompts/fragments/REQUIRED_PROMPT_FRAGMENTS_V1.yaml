metadata:
  artifact: prompt-fragments
  version: v1
  marker_coverage:
    - KK-C20
    - KK-C21

required_fragments:
  - id: role_definition
    description: Define domain role and orchestration scope.
  - id: allowed_tools
    description: Declare allowed MCP tools and agent-as-tool targets.
  - id: prohibited_actions
    description: Explicitly ban unsafe tools and datastore paths.
  - id: casefile_behavior
    description: Require case-file read and write behavior by contract.
  - id: escalation_rules
    description: Define stop, continue, escalate, and approval triggers.

