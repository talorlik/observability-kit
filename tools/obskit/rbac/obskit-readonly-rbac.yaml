# Read-only RBAC for the obskit executor (Batch 17, TR-18).
#
# Grants exactly get, list, and watch - the executor observes only and
# never mutates cluster state. Secret access is deliberately absent:
# secret integrations (external-secrets, vault, sealed-secrets) are
# detected via their CRDs and workloads, so Secret values are
# structurally unreadable, not merely unread.
#
# The required_permissions preflight check uses SelfSubjectAccessReview,
# which the default system:basic-user binding already permits for any
# authenticated subject; no create verb is granted here.
#
# Used by the optional in-cluster Job mode. CLI runs against a
# kubeconfig use whatever read-only identity that kubeconfig carries.
---
apiVersion: v1
kind: Namespace
metadata:
  name: obskit-system
  labels:
    app.kubernetes.io/name: obskit
    app.kubernetes.io/part-of: observability-kit
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obskit
  namespace: obskit-system
  labels:
    app.kubernetes.io/name: obskit
    app.kubernetes.io/part-of: observability-kit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: obskit-readonly
  labels:
    app.kubernetes.io/name: obskit
    app.kubernetes.io/part-of: observability-kit
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - services
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingressclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiregistration.k8s.io"]
    resources:
      - apiservices
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: obskit-readonly
  labels:
    app.kubernetes.io/name: obskit
    app.kubernetes.io/part-of: observability-kit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: obskit-readonly
subjects:
  - kind: ServiceAccount
    name: obskit
    namespace: obskit-system
