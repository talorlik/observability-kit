# Tenant control plane API contract (Batch 20 Task 1, TR-21). OpenAPI
# document fixing the API surface of the tenant control plane service
# (services/tenancy/, ADR-0004): tenant CRUD plus the provision,
# suspend, resume, offboard, and purge lifecycle transitions, with
# exactly the state machine and idempotent-replay semantics of
# contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml. States,
# transitions, and approval risk classes are restated by name in the
# x-lifecycle-binding block so validators can cross-check the two
# contracts mechanically. Every transition materializes as a GitOps
# render (TR-10): responses carry render and commit references, never
# live-mutation reports. Destructive transitions delegate approval
# semantics to contracts/policy/APPROVAL_FLOW_V1.yaml.
openapi: 3.1.0

info:
  title: Tenant Control Plane API
  version: 1.0.0
  description: >-
    Control-plane API for tenant management (TR-21). The tenant
    contract document validated by
    contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json is the
    authoritative tenant record; this API creates, reads, updates, and
    transitions those documents. Lifecycle transitions execute the
    state machine of
    contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml verbatim and
    are GitOps-only - a transition renders per-tenant overlays and
    isolation artifacts per
    contracts/tenancy/TENANT_OVERLAY_GENERATION_CONTRACT_V1.yaml and
    contracts/tenancy/TENANT_ISOLATION_MATRIX_V1.yaml and emits a
    prepared commit reference; the service never writes mutable
    cluster or store state directly for persistent configuration.
    This API is control-plane only: it carries tenant management data
    and never tenant telemetry payloads (TR-16 plane separation).

x-contract:
  contract: tenant-control-plane-api
  version: v1
  batch: TB-20
  requirement_markers:
    - TR-21
    - TR-16
    - TR-10
    - TR-09
  adr: docs/adr/ADR_0004_TENANT_CONTROL_PLANE_SERVICE.md
  related_contracts:
    tenant_schema: contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json
    lifecycle: contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml
    isolation_matrix: contracts/tenancy/TENANT_ISOLATION_MATRIX_V1.yaml
    overlay_generation: >-
      contracts/tenancy/TENANT_OVERLAY_GENERATION_CONTRACT_V1.yaml
    approval_flow: contracts/policy/APPROVAL_FLOW_V1.yaml

# Machine-readable binding to the lifecycle contract. A validator must
# be able to compare every value below against
# contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml by name and fail
# on any drift: same states, same initial and terminal states, same
# from/to sets per transition, same idempotency, same approval risk
# classes, same audit field lists.
x-lifecycle-binding:
  contract: contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml
  states:
    - provisioning
    - active
    - suspended
    - offboarding
    - purged
  initial_state: provisioning
  terminal_states:
    - purged
  transitions:
    provision:
      from:
        - provisioning
      to: active
      idempotent: true
      destructive: false
      approval: null
      operation: provisionTenant
      audit_required_fields:
        - tenant_id
        - transition
        - actor
        - requested_at
        - completed_at
        - replay
    suspend:
      from:
        - active
      to: suspended
      idempotent: true
      destructive: false
      approval: null
      operation: suspendTenant
      audit_required_fields:
        - tenant_id
        - transition
        - actor
        - trigger_type
        - reason
        - replay
    resume:
      from:
        - suspended
      to: active
      idempotent: true
      destructive: false
      approval: null
      operation: resumeTenant
      audit_required_fields:
        - tenant_id
        - transition
        - actor
        - reason
        - replay
    offboard:
      from:
        - active
        - suspended
      to: offboarding
      idempotent: true
      destructive: true
      approval:
        contract: contracts/policy/APPROVAL_FLOW_V1.yaml
        risk_class: write.high-risk
      operation: offboardTenant
      audit_required_fields:
        - tenant_id
        - transition
        - actor
        - approval_id
        - retention_window_ends_at
        - replay
    purge:
      from:
        - offboarding
      to: purged
      idempotent: true
      destructive: true
      approval:
        contract: contracts/policy/APPROVAL_FLOW_V1.yaml
        risk_class: write.critical
      operation: purgeTenant
      audit_required_fields:
        - tenant_id
        - transition
        - actor
        - approval_id
        - change_ticket
        - evidence_artifact_refs
        - purged_at
        - replay
  # Idempotent replay, verbatim semantics: re-running a transition
  # that already completed is a no-op that leaves the tenant in the
  # same end state, returns HTTP 200 with replay: true, and emits an
  # audit record marked replay=true. Replays are never errors.
  idempotent_replay:
    replayed_transition_http_status: 200
    replay_response_field: replay
    replay_audit_field: replay
    replay_is_error: false
  # Execution gates, verbatim from the lifecycle contract: evaluated
  # by the service before mutating anything.
  execution_gates:
    validate_contract_document_before_transition: true
    deny_on_missing_preconditions: true
    deny_on_unknown_transition_or_state: true
    emit_audit_record_on_denial: true
  # GitOps-only execution (TR-10): a transition's side effects are
  # rendered files and a prepared commit reference. Direct kubectl or
  # store-API writes of persistent configuration are forbidden.
  gitops_only_transitions: true

servers:
  - url: /api/tenancy/v1
    description: >-
      Deployment-relative base path. Host, scheme, and ingress are
      environment concerns resolved by the environment overlay and the
      active network ingress adapter; no concrete endpoint is part of
      this contract.

security:
  - bearerAuth: []

tags:
  - name: tenants
    description: Tenant CRUD over the tenant contract document.
  - name: lifecycle
    description: >-
      Lifecycle transitions mirroring
      contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml.

paths:
  /tenants:
    post:
      operationId: createTenant
      tags:
        - tenants
      summary: Create a tenant (enters the state machine).
      description: >-
        Submits a tenant contract document that must validate against
        contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json with
        lifecycle_state set to the initial state (provisioning).
        Creation registers the tenant in the control plane; it does
        not provision data-plane artifacts - that is the provision
        transition. A tenant_id present in any lifecycle state other
        than purged conflicts; a purged tenant_id may be reused only
        via a new contract document (re-onboarding is a new
        provision, per the lifecycle contract invariants).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantDocument'
      responses:
        '201':
          description: Tenant registered with lifecycle_state
            provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDocument'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '409':
          $ref: '#/components/responses/TenantConflict'
    get:
      operationId: listTenants
      tags:
        - tenants
      summary: List tenants visible to the caller.
      description: >-
        Returns tenant contract documents the caller is authorized to
        see. Cross-tenant visibility is deny-by-default: a
        tenant-scoped caller sees only its own tenant; listing never
        leaks other tenants' documents (TR-16).
      parameters:
        - name: lifecycle_state
          in: query
          required: false
          description: Filter by lifecycle state.
          schema:
            $ref: '#/components/schemas/LifecycleState'
      responses:
        '200':
          description: Tenant documents the caller may read.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - tenants
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantDocument'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /tenants/{tenant_id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
    get:
      operationId: getTenant
      tags:
        - tenants
      summary: Read one tenant contract document.
      responses:
        '200':
          description: The tenant contract document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDocument'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
    put:
      operationId: updateTenant
      tags:
        - tenants
      summary: Update mutable tenant descriptor fields.
      description: >-
        Replaces mutable descriptor fields of the tenant contract
        document. The result must still validate against
        contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json.
        lifecycle_state is never writable through CRUD - state changes
        happen only through the lifecycle transition operations below;
        tenant_id and created_at are immutable. Attempts to change a
        forbidden field are rejected with error_code
        update-forbidden-field and no partial write.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: The updated tenant contract document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDocument'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/ForbiddenFieldUpdate'
    delete:
      operationId: deleteTenant
      tags:
        - tenants
        - lifecycle
      summary: Delete a tenant (alias for the offboard transition).
      description: >-
        The lifecycle contract defines no deletion outside the
        offboard-then-purge path, so DELETE is a semantic alias for
        the offboard transition and carries the same approval-gated
        request body and response. Data is retained for the full
        retention window; irreversible deletion happens only through
        the separate, explicitly requested purge transition. DELETE
        never triggers purge.
      x-lifecycle-transition: offboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OffboardRequest'
      responses:
        '200':
          description: >-
            Offboard applied (replay: false) or replayed
            (replay: true).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OffboardResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/IllegalTransition'

  /tenants/{tenant_id}/lifecycle/provision:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
    post:
      operationId: provisionTenant
      tags:
        - lifecycle
      summary: 'Transition provision: provisioning to active.'
      description: >-
        Creates all tenant partitions and access artifacts for the
        declared isolation class (per
        contracts/tenancy/TENANT_ISOLATION_MATRIX_V1.yaml and
        contracts/tenancy/TENANT_OVERLAY_GENERATION_CONTRACT_V1.yaml),
        then marks the tenant active. Operator-initiated; completion
        to active is automated once every provisioning output is
        verified healthy. Preconditions per the lifecycle contract:
        the document validates against the authoritative schema, the
        tenant_id is not present in any lifecycle state other than
        provisioning, and residency constraints are satisfiable by the
        target data plane. Re-running provision for a tenant already
        active is a no-op replay (every creation step is
        create-if-absent, converge-if-drifted); a partially failed
        provision is safely re-run to completion.
      x-lifecycle-transition: provision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionRequest'
      responses:
        '200':
          description: >-
            Provision applied (replay: false) or replayed
            (replay: true); end state active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/IllegalTransition'

  /tenants/{tenant_id}/lifecycle/suspend:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
    post:
      operationId: suspendTenant
      tags:
        - lifecycle
      summary: 'Transition suspend: active to suspended.'
      description: >-
        Stops tenant ingest at the collector routing layer and revokes
        tenant UI access by disabling role mappings, while retaining
        all tenant data and continuing audit capture. Triggered by an
        operator (commercial or security grounds) or by automated
        policy (sustained quota breach or billing signal); automated
        triggers must cite the violated policy and operator triggers
        must cite a reason, recorded in the audit record. Suspension
        deletes nothing and never pauses TR-09 evidence collection.
        Re-running suspend for a tenant already suspended is a no-op
        replay.
      x-lifecycle-transition: suspend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuspendRequest'
      responses:
        '200':
          description: >-
            Suspend applied (replay: false) or replayed
            (replay: true); end state suspended.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuspendResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/IllegalTransition'

  /tenants/{tenant_id}/lifecycle/resume:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
    post:
      operationId: resumeTenant
      tags:
        - lifecycle
      summary: 'Transition resume: suspended to active.'
      description: >-
        Reverses a suspension using the artifacts retained during
        suspension: re-enables ingest and restores UI access, proving
        suspend non-destructive. Operator-initiated after the
        suspension cause is resolved; the triggering cause recorded at
        suspension must be marked resolved in the audit trail.
        Re-running resume for a tenant already active is a no-op
        replay.
      x-lifecycle-transition: resume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResumeRequest'
      responses:
        '200':
          description: >-
            Resume applied (replay: false) or replayed
            (replay: true); end state active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/IllegalTransition'

  /tenants/{tenant_id}/lifecycle/offboard:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
    post:
      operationId: offboardTenant
      tags:
        - lifecycle
      summary: >-
        Transition offboard: active or suspended to offboarding
        (destructive, approval-gated).
      description: >-
        Begins controlled removal: ingest and UI access are terminally
        revoked, data enters its contractual retention window (the
        longest of the tenant contract's retention days plus any
        residency-mandated hold), and the tenant becomes eligible for
        purge only after that window elapses. Nothing is deleted
        during offboarding. Operator-initiated only, never automated,
        and blocked without an approved request at risk class
        write.high-risk per contracts/policy/APPROVAL_FLOW_V1.yaml
        (approval fields, pending timeout, and escalation follow that
        contract and are not redefined here). Re-running offboard for
        a tenant already offboarding is a no-op replay and does not
        reset the retention clock.
      x-lifecycle-transition: offboard
      x-approval:
        contract: contracts/policy/APPROVAL_FLOW_V1.yaml
        risk_class: write.high-risk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OffboardRequest'
      responses:
        '200':
          description: >-
            Offboard applied (replay: false) or replayed
            (replay: true); end state offboarding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OffboardResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/IllegalTransition'

  /tenants/{tenant_id}/lifecycle/purge:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
    post:
      operationId: purgeTenant
      tags:
        - lifecycle
      summary: >-
        Transition purge: offboarding to purged (terminal,
        destructive, approval-gated).
      description: >-
        Irreversibly deletes every tenant data partition and access
        artifact, captures deletion evidence per store (OpenSearch
        indices, security roles and mappings, dashboard spaces, vector
        indices, graph database, GitOps overlay), and marks the tenant
        purged. Operator-initiated only; retention expiry makes a
        tenant eligible but never executes the purge. Preconditions
        per the lifecycle contract: offboard applied with its audit
        record present, the recorded retention window elapsed, no
        legal or residency hold set, and an approved purge request at
        risk class write.critical per
        contracts/policy/APPROVAL_FLOW_V1.yaml (including the manual
        workflow requirement and change_ticket field). Evidence
        artifacts and the purge audit record are control-plane records
        retained immutably for the configured evidence retention
        period. Re-running purge for a tenant already purged is a
        no-op replay (deletion steps are delete-if-present); a
        partially failed purge is safely re-run until every evidence
        artifact is captured. There are no transitions out of purged.
      x-lifecycle-transition: purge
      x-approval:
        contract: contracts/policy/APPROVAL_FLOW_V1.yaml
        risk_class: write.critical
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurgeRequest'
      responses:
        '200':
          description: >-
            Purge applied (replay: false) or replayed (replay: true);
            end state purged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurgeResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '404':
          $ref: '#/components/responses/TenantNotFound'
        '409':
          $ref: '#/components/responses/IllegalTransition'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Caller identity is resolved through the active identity
        backend adapter (Batch 13); no identity provider is hardcoded.
        Authorization is tenant-scoped and deny-by-default: a caller
        not authorized for the addressed tenant_id receives the
        cross-tenant denial error and the denial is audited (TR-16,
        TR-09).

  parameters:
    TenantIdPath:
      name: tenant_id
      in: path
      required: true
      description: >-
        Tenant identifier; pattern is authoritative in
        contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json.
      schema:
        type: string
        pattern: '^[a-z0-9]([a-z0-9-]{0,30}[a-z0-9])?$'

  responses:
    ValidationFailed:
      description: >-
        Request body invalid, or the tenant contract document fails
        validation against the authoritative schema (execution gate
        validate_contract_document_before_transition).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthenticated:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AccessDenied:
      description: >-
        Authorization denied. Covers cross-tenant access (error_code
        cross-tenant-access-denied: the caller is authenticated but
        not authorized for the addressed tenant_id; deny-by-default
        per TR-16) and missing, invalid, expired, or timed-out
        approval on destructive transitions (error_code
        approval-required or approval-invalid; timeout and escalation
        per contracts/policy/APPROVAL_FLOW_V1.yaml). Denials emit
        audit records: audit_record_id is populated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TenantNotFound:
      description: >-
        No tenant contract document for tenant_id (error_code
        tenant-not-found). Also returned for unknown lifecycle states
        encountered in storage (execution gate
        deny_on_unknown_transition_or_state); unknown transition names
        are unroutable by construction (fixed paths).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TenantConflict:
      description: >-
        tenant_id already present in a lifecycle state other than
        purged (error_code tenant-already-exists).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenFieldUpdate:
      description: >-
        Update attempted on an immutable or lifecycle-owned field
        (error_code update-forbidden-field). lifecycle_state changes
        only through transition operations.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IllegalTransition:
      description: >-
        The tenant's current state is not in the transition's allowed
        from set, or a transition precondition failed (error_code
        illegal-transition or precondition-failed; execution gate
        deny_on_missing_preconditions). Distinct from replay: a replay
        is a completed transition re-run reaching its end state and is
        returned as HTTP 200 with replay: true, never as this error.
        Denials emit audit records: audit_record_id is populated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    TenantDocument:
      $ref: './TENANT_CONTRACT_SCHEMA_V1.json'
      description: >-
        The authoritative tenant contract document. Its
        lifecycle_state field is the single source of truth for the
        state machine.

    LifecycleState:
      type: string
      description: >-
        Exactly the lifecycle_state enum of
        contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json; no
        additional states are permitted.
      enum:
        - provisioning
        - active
        - suspended
        - offboarding
        - purged

    TenantUpdateRequest:
      type: object
      description: >-
        Full tenant contract document with updated mutable fields; the
        result must validate against
        contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json. The fields
        listed in x-immutable-fields must be byte-identical to the
        stored document or the update is rejected with error_code
        update-forbidden-field.
      x-immutable-fields:
        - tenant_id
        - lifecycle_state
        - created_at

    ApprovalRecordHighRisk:
      type: object
      description: >-
        Approval record for risk class write.high-risk; required
        fields are exactly the required_approval_fields of
        contracts/policy/APPROVAL_FLOW_V1.yaml. The decision must be
        an approval; pending timeout and escalation semantics are
        owned by the approval flow contract.
      additionalProperties: false
      required:
        - approval_id
        - approver
        - decision
        - decided_at
      properties:
        approval_id:
          type: string
          minLength: 1
        approver:
          type: string
          minLength: 1
        decision:
          type: string
          enum:
            - approved
        decided_at:
          type: string
          format: date-time

    ApprovalRecordCritical:
      type: object
      description: >-
        Approval record for risk class write.critical; adds the
        change_ticket field required by
        contracts/policy/APPROVAL_FLOW_V1.yaml, whose manual workflow
        requirement also applies.
      additionalProperties: false
      required:
        - approval_id
        - approver
        - decision
        - decided_at
        - change_ticket
      properties:
        approval_id:
          type: string
          minLength: 1
        approver:
          type: string
          minLength: 1
        decision:
          type: string
          enum:
            - approved
        decided_at:
          type: string
          format: date-time
        change_ticket:
          type: string
          minLength: 1

    ProvisionRequest:
      type: object
      additionalProperties: false
      required:
        - actor
      properties:
        actor:
          type: string
          description: Operator identity initiating the transition.
          minLength: 1
        reason:
          type: string

    SuspendRequest:
      type: object
      additionalProperties: false
      required:
        - actor
        - trigger_type
        - reason
      properties:
        actor:
          type: string
          description: >-
            Operator identity, or the automated policy actor for
            automated triggers.
          minLength: 1
        trigger_type:
          type: string
          description: >-
            operator-or-automated trigger per the lifecycle contract.
          enum:
            - operator
            - automated
        reason:
          type: string
          description: >-
            Operator triggers cite a reason; automated triggers cite
            the violated policy. Recorded in the audit record.
          minLength: 1

    ResumeRequest:
      type: object
      additionalProperties: false
      required:
        - actor
        - reason
      properties:
        actor:
          type: string
          minLength: 1
        reason:
          type: string
          description: >-
            Resolution of the suspension cause; the cause recorded at
            suspension must be marked resolved in the audit trail.
          minLength: 1

    OffboardRequest:
      type: object
      additionalProperties: false
      required:
        - actor
        - reason
        - approval
      properties:
        actor:
          type: string
          minLength: 1
        reason:
          type: string
          minLength: 1
        approval:
          $ref: '#/components/schemas/ApprovalRecordHighRisk'

    PurgeRequest:
      type: object
      additionalProperties: false
      required:
        - actor
        - approval
      properties:
        actor:
          type: string
          minLength: 1
        reason:
          type: string
        approval:
          $ref: '#/components/schemas/ApprovalRecordCritical'

    GitOpsRenderReference:
      type: object
      description: >-
        GitOps materialization of a transition (TR-10). Transitions
        change rendered files and produce a prepared commit; they
        never mutate clusters or stores directly for persistent
        configuration. Overlay paths and behavior per lifecycle state
        (retain on suspend, retain until purge evidence during
        offboarding, remove on purge) are owned by
        contracts/tenancy/TENANT_OVERLAY_GENERATION_CONTRACT_V1.yaml.
      additionalProperties: false
      required:
        - render_action
      properties:
        render_action:
          type: string
          description: >-
            rendered: overlay (re)generated. retained: overlay kept
            unchanged by contract (for example suspend and offboard).
            removed: overlay directory removed via git commit (purge).
            not-applicable: no overlay exists for the isolation class.
            replayed-no-diff: idempotent replay produced no diff and
            no commit.
          enum:
            - rendered
            - retained
            - removed
            - not-applicable
            - replayed-no-diff
        overlay_path:
          type: string
          description: >-
            Repository path of the tenant overlay directory
            (gitops/overlays/tenants/<tenant_id>/), when one applies.
        commit_ref:
          type: string
          description: >-
            Opaque reference to the prepared or recorded git commit
            carrying the render. Absent when render_action is
            not-applicable or replayed-no-diff.

    AuditRecordRef:
      type: object
      description: >-
        Reference to the audit record emitted for a transition attempt
        (TR-09). Every transition response and every transition denial
        carries one; required fields per transition are bound in
        x-lifecycle-binding.transitions.<name>.audit_required_fields
        and restated on each response schema. Audit records are
        control-plane records and never embed tenant telemetry
        payloads.
      additionalProperties: true
      required:
        - audit_record_id
        - tenant_id
        - transition
        - actor
        - replay
      properties:
        audit_record_id:
          type: string
          minLength: 1
        tenant_id:
          type: string
        transition:
          type: string
          enum:
            - provision
            - suspend
            - resume
            - offboard
            - purge
        actor:
          type: string
        replay:
          type: boolean
          description: >-
            True when this attempt was an idempotent replay of a
            completed transition.

    TransitionResponse:
      type: object
      description: >-
        Common shape of every successful transition response. replay
        is false when the transition was applied and true when it was
        an idempotent no-op replay; in both cases lifecycle_state is
        the transition's end state and an audit record is emitted.
      required:
        - tenant_id
        - transition
        - lifecycle_state
        - replay
        - audit
        - gitops_render
      properties:
        tenant_id:
          type: string
        transition:
          type: string
          enum:
            - provision
            - suspend
            - resume
            - offboard
            - purge
        from_state:
          $ref: '#/components/schemas/LifecycleState'
          description: >-
            State at evaluation time. On a replay this equals the end
            state.
        lifecycle_state:
          $ref: '#/components/schemas/LifecycleState'
          description: End state after the transition (or replay).
        replay:
          type: boolean
        audit:
          $ref: '#/components/schemas/AuditRecordRef'
        gitops_render:
          $ref: '#/components/schemas/GitOpsRenderReference'

    ProvisionResponse:
      allOf:
        - $ref: '#/components/schemas/TransitionResponse'
        - type: object
          description: 'End state: active.'
          x-audit-required-fields:
            - tenant_id
            - transition
            - actor
            - requested_at
            - completed_at
            - replay
          properties:
            audit:
              allOf:
                - $ref: '#/components/schemas/AuditRecordRef'
                - type: object
                  required:
                    - requested_at
                    - completed_at
                  properties:
                    requested_at:
                      type: string
                      format: date-time
                    completed_at:
                      type: string
                      format: date-time

    SuspendResponse:
      allOf:
        - $ref: '#/components/schemas/TransitionResponse'
        - type: object
          description: 'End state: suspended.'
          x-audit-required-fields:
            - tenant_id
            - transition
            - actor
            - trigger_type
            - reason
            - replay
          properties:
            audit:
              allOf:
                - $ref: '#/components/schemas/AuditRecordRef'
                - type: object
                  required:
                    - trigger_type
                    - reason
                  properties:
                    trigger_type:
                      type: string
                      enum:
                        - operator
                        - automated
                    reason:
                      type: string

    ResumeResponse:
      allOf:
        - $ref: '#/components/schemas/TransitionResponse'
        - type: object
          description: 'End state: active.'
          x-audit-required-fields:
            - tenant_id
            - transition
            - actor
            - reason
            - replay
          properties:
            audit:
              allOf:
                - $ref: '#/components/schemas/AuditRecordRef'
                - type: object
                  required:
                    - reason
                  properties:
                    reason:
                      type: string

    OffboardResponse:
      allOf:
        - $ref: '#/components/schemas/TransitionResponse'
        - type: object
          description: >-
            End state: offboarding. retention_window_ends_at is the
            purge-eligibility time derived from the tenant contract
            retention block; replays do not reset it.
          x-audit-required-fields:
            - tenant_id
            - transition
            - actor
            - approval_id
            - retention_window_ends_at
            - replay
          properties:
            audit:
              allOf:
                - $ref: '#/components/schemas/AuditRecordRef'
                - type: object
                  required:
                    - approval_id
                    - retention_window_ends_at
                  properties:
                    approval_id:
                      type: string
                    retention_window_ends_at:
                      type: string
                      format: date-time

    PurgeResponse:
      allOf:
        - $ref: '#/components/schemas/TransitionResponse'
        - type: object
          description: >-
            End state: purged (terminal). evidence_artifact_refs
            reference the per-store deletion evidence defined by the
            lifecycle contract's evidence_capture block; evidence is
            control-plane data retained immutably for the configured
            evidence retention period.
          x-audit-required-fields:
            - tenant_id
            - transition
            - actor
            - approval_id
            - change_ticket
            - evidence_artifact_refs
            - purged_at
            - replay
          properties:
            audit:
              allOf:
                - $ref: '#/components/schemas/AuditRecordRef'
                - type: object
                  required:
                    - approval_id
                    - change_ticket
                    - evidence_artifact_refs
                    - purged_at
                  properties:
                    approval_id:
                      type: string
                    change_ticket:
                      type: string
                    evidence_artifact_refs:
                      type: array
                      items:
                        type: string
                    purged_at:
                      type: string
                      format: date-time

    ErrorResponse:
      type: object
      description: >-
        Contract-fixed error shape. Transition denials (illegal
        transition, failed precondition, missing or invalid approval,
        cross-tenant access) always populate audit_record_id, per the
        lifecycle contract's emit_audit_record_on_denial gate.
      additionalProperties: false
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          enum:
            - validation-failed
            - tenant-not-found
            - tenant-already-exists
            - update-forbidden-field
            - illegal-transition
            - precondition-failed
            - approval-required
            - approval-invalid
            - cross-tenant-access-denied
            - unauthenticated
        message:
          type: string
        tenant_id:
          type: string
          description: >-
            Addressed tenant, when one was resolvable. Never reveals
            whether an unauthorized tenant_id exists beyond what the
            caller supplied.
        audit_record_id:
          type: string
          description: Audit record emitted for the denial (TR-09).
        details:
          type: object
          description: >-
            Machine-readable specifics, for example the current state
            and the transition's allowed from set on
            illegal-transition.
