# Per-tenant GitOps overlay generation and control-plane versus
# data-plane separation contract (Batch 15 Task 4, TR-16).
#
# Input is one tenant descriptor that validates against
# TENANT_CONTRACT_SCHEMA_V1.json. Output is one generated overlay
# directory under gitops/overlays/tenants/<tenant_id>/ consumed by the
# tenant delivery ApplicationSet. Core charts are never modified per
# tenant; propagation is GitOps-only.

metadata:
  contract: tenant-overlay-generation
  version: v1
  batch: TB-15
  technical_requirements:
    - TR-10
    - TR-16
  related_contracts:
    - contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json
    - contracts/tenancy/TENANT_ISOLATION_MATRIX_V1.yaml
    - contracts/tenancy/TENANT_LIFECYCLE_CONTRACT_V1.yaml

input:
  descriptor_schema: contracts/tenancy/TENANT_CONTRACT_SCHEMA_V1.json
  descriptor_must_validate: true
  # Overlay generation is gated on lifecycle state. Suspended tenants
  # keep their overlay (sync disabled by the delivery ApplicationSet)
  # so resume is a pure GitOps toggle, not a re-render.
  generation_allowed_lifecycle_states:
    - provisioning
    - active
    - suspended
  offboarding_behavior: retain-overlay-until-purge-evidence-recorded
  purged_behavior: remove-overlay-directory-via-git-commit

output:
  overlay_root: gitops/overlays/tenants/
  directory_naming: gitops/overlays/tenants/<tenant_id>/
  # Directory name must equal the descriptor tenant_id verbatim. The
  # tenant_id pattern in the schema is lowercase-only, so any uppercase
  # directory name can never collide with a real tenant. One uppercase
  # name is reserved for the committed generator-output example.
  directory_name_must_equal_tenant_id: true
  reserved_non_tenant_directories:
    - EXAMPLE_TENANT_OVERLAY
  required_files:
    - name: tenant-values.yaml
      purpose: >-
        Helm values overlay layered over gitops/overlays/base by the
        tenant delivery ApplicationSet. It parameterizes values the
        core charts already expose; it never patches chart templates.
    - name: applicationset-element.yaml
      purpose: >-
        Flat parameter element merged into the list generator of the
        tenant delivery ApplicationSet. Environment-specific fields
        (destination server, repoURL, targetRevision) live in the
        ApplicationSet template owned by the control plane, never in
        the element.
  generated_file_header_marker: >-
    GENERATED by the tenant overlay generator - DO NOT EDIT BY HAND.
  header_marker_required_in_all_generated_files: true

parameterization:
  # Generated output may be parameterized ONLY by fields of the
  # validated tenant descriptor. No other input source is permitted.
  allowed_parameter_source: tenant-descriptor-fields-only
  allowed_parameters:
    - tenant_id
    - display_name
    - tier
    - isolation_class
    - residency.region
    - residency.data_residency_required
    - residency.pool
    - residency.allowed_regions
    - lifecycle_state
    - quotas.ingest.max_gb_per_day
    - quotas.ingest.max_events_per_second
    - quotas.retention.logs_days
    - quotas.retention.metrics_days
    - quotas.retention.traces_days
  forbidden_in_generated_output:
    - environment-names-or-environment-keys
    - cluster-api-endpoints-or-destination-servers
    - repository-urls-or-target-revisions
    - credentials-tokens-or-secret-material
    - provider-specific-resource-identifiers
    - telemetry-payloads-or-telemetry-samples

invariants:
  # Core charts are shared, tenant-neutral delivery artifacts. A
  # tenant change that diffs gitops/charts/ is a contract violation.
  core_charts_read_only_per_tenant: true
  core_chart_paths:
    - gitops/charts/
  # Overlays reach clusters only via git commit and ArgoCD reconcile.
  # Direct kubectl or API writes of tenant delivery config are
  # forbidden (GitOps-only propagation per TR-10).
  gitops_only_propagation: true
  generated_overlays_committed_to_git: true
  # Same descriptor bytes in, same overlay bytes out: regeneration is
  # deterministic (no timestamps, hostnames, ordering drift, or random
  # identifiers in output) and idempotent (re-running against an
  # unchanged descriptor produces no diff and no commit).
  deterministic_regeneration: byte-identical-for-identical-descriptor
  idempotent_regeneration: no-diff-no-commit-when-descriptor-unchanged
  hand_edits_forbidden_in_generated_overlays: true
  tool_neutrality: >-
    ApplicationSet is the reference rendering target; any GitOps
    controller that consumes the same committed files satisfies the
    contract (TR-10). No controller-proprietary field is required.

plane_separation:
  control_plane:
    purpose: tenant-management
    owns:
      - tenant-descriptors
      - generated-overlay-directories
      - lifecycle-records
      - approval-and-purge-evidence
      - tenant-scoped-audit-records
    namespaces:
      - argocd
      - tenancy-control
    stores:
      - git-repository
      - opensearch-indices: control-tenancy-*
  data_plane:
    purpose: tenant-telemetry
    owns:
      - logs
      - metrics
      - traces
      - vector-embeddings
      - derived-graph-data
    namespaces:
      - observability
      - tenant-<tenant_id>
    namespace_notes: >-
      shared-partition and dedicated-indices tenants share the
      observability data-plane namespaces; dedicated-stack tenants get
      tenant-<tenant_id> namespaces rendered from their overlay.
    stores:
      - opensearch-indices: tenant-<tenant_id>-<signal>-*
      - neo4j-database: per-tenant-database-in-graph-enabled-mode
      - vector-indices: per-tenant-with-mandatory-retrieval-filters
  rules:
    # Control-plane records reference telemetry (index names, document
    # counts, evidence digests) but never embed telemetry payloads.
    control_plane_records_never_embed_telemetry_payloads: true
    telemetry_reference_forms_allowed:
      - index-name
      - document-count
      - content-digest
    # Telemetry flows only into the tenant's data-plane partition and
    # never leaves it; control-plane stores accept no telemetry.
    telemetry_never_written_to_control_plane_stores: true
    telemetry_never_leaves_tenant_data_plane_partition: true
    cross_plane_access: deny-by-default
    cross_plane_exceptions:
      - actor: overlay-generator
        access: read-descriptor-write-overlay
        plane: control-plane-only
      - actor: gitops-controller
        access: apply-committed-overlay-to-data-plane
        direction: control-plane-to-data-plane
        write_scope: delivery-config-only-never-telemetry

compliance:
  fail_if_core_chart_diff_in_tenant_change: true
  fail_if_overlay_directory_name_not_tenant_id: true
  fail_if_required_generated_file_missing: true
  fail_if_generated_file_missing_header_marker: true
  fail_if_environment_value_in_generated_overlay: true
  fail_if_regeneration_not_byte_identical: true
  fail_if_overlay_propagated_outside_git: true
  fail_if_telemetry_payload_in_control_plane_record: true
  fail_if_telemetry_written_to_control_plane_store: true
