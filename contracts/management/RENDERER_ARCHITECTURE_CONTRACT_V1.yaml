# Renderer architecture contract for the configuration rendering
# runtime (Batch 19 Task 1, TR-20).
#
# Machine-readable boundaries of the runtime that executes the
# propagation and reconciliation contract: package posture, input and
# output surfaces, determinism and idempotency guarantees, the render
# strategy catalog, drift and rollback tooling, and compliance rules.
# The narrative decision record is
# docs/adr/ADR_0003_CONFIG_RENDERER_ARCHITECTURE.md.
#
# Consumes:
#   - contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json (document and
#     binding shape; every render input validates against it)
#   - contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml (registered
#     systems and config surfaces; binding targets must fall inside)
#   - contracts/management/PROPAGATION_RECONCILIATION_CONTRACT_V1.yaml
#     (pipeline stages, marker and trailer requirements, drift signals,
#     rollback mechanisms this runtime implements)

metadata:
  contract: config-renderer-architecture
  version: v1
  owner: platform-management
  technical_requirements:
    - TR-20
    - TR-17
    - TR-10
  decided_by: docs/adr/ADR_0003_CONFIG_RENDERER_ARCHITECTURE.md
  validated_by: scripts/ci/validate_config_renderer.sh
  related_contracts:
    - contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json
    - contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml
    - contracts/management/PROPAGATION_RECONCILIATION_CONTRACT_V1.yaml
    - contracts/management/SINGLE_PANE_ACCESS_CONTRACT_V1.yaml

runtime:
  language: python
  minimum_version: "3.11"
  package_root: tools/obskit/
  package_name: obskit
  subpackage: obskit.configrender
  dependency_manifest: tools/obskit/pyproject.toml
  pinned_requirements: tools/obskit/requirements.txt
  # requirements-ci.txt stays lint-only; the renderer never extends it.
  extends_requirements_ci: false
  core_dependencies: stdlib-only
  typing:
    type_hints: mandatory
    structured_data: frozen-dataclasses

entrypoints:
  cli:
    render:
      command: obskit render
      description: >-
        Validates the unified document, enforces the cross-file rules,
        renders every binding through its cataloged strategy, writes
        outputs under the repo root, and emits the render manifest and
        the prepared commit message with the required trailers.
    idempotency_check:
      command: obskit render --check
      description: >-
        Plans the render without writing and exits non-zero when any
        target would change; the no-diff, no-commit proof for an
        unchanged document.
    drift:
      command: obskit drift
      description: >-
        Compares expected rendered bytes against a target tree and
        emits the rendered-versus-live diff surface consumed by the
        TR-12 meta-monitoring alert path.
    rollback:
      command: obskit rollback
      description: >-
        Re-renders from a prior unified document revision through the
        identical render-and-commit pipeline; never a separate apply
        channel.
  drill_wrapper:
    script: scripts/ops/run_config_rollback_drill.sh
    modes:
      - dry-run
      - real
    default_mode: dry-run
    conventions_source: scripts/ops/run_rollback_drill.sh

inputs:
  document_format: json
  document_format_notes: >-
    JSON is the dependency-free interchange form (ADR-0002 precedent).
    The canonical YAML sample keeps a semantically identical JSON twin
    (samples/VALID_UNIFIED_CONFIG.json) enforced by the validator.
  schema: contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json
  schema_validator: >-
    obskit.install.contract JSON-Schema subset validator, extended
    with $ref/$defs, const, minimum, maximum, minItems, minProperties,
    and items; unimplemented keywords fail loudly.
  cross_file_rules_enforced_before_write:
    - binding-system-registered-in-wrapped-system-registry
    - every-present-config-leaf-key-has-a-binding
    - every-binding-resolves-to-a-present-leaf-key
    - binding-repo-path-within-registered-config-surface
  registry_fact_extraction: line-based-stdlib-yaml-subset

outputs:
  write_scope: render-targets-under-repo-root-only
  forbidden_write_paths:
    - gitops/charts/
  live_writes: forbidden
  determinism:
    byte_identical_for_identical_document: true
    no_timestamps: true
    no_hostnames_or_environment_values: true
    no_random_identifiers: true
    stable_key_ordering: true
  idempotency:
    unchanged_document_produces_no_diff_no_commit: true
  generated_file_header_marker: >-
    GENERATED by the unified configuration renderer - DO NOT EDIT
    BY HAND.
  render_manifest:
    path: gitops/UNIFIED_CONFIG_RENDER_MANIFEST.json
    role:
      - sibling-marker-carrier-for-comment-incapable-formats
      - drift-detection-input-surface
    records:
      - unified-config-schema-version
      - unified-config-document-digest
      - rendered-artifacts-with-content-digests
  commit_message:
    emitted_by_renderer: true
    git_execution_by_renderer: false
    required_trailers:
      - Unified-Config-Schema-Version
      - Unified-Config-Document-Digest

# Render strategy catalog. Every (unified_key, system) binding pair of
# the canonical document maps to exactly one strategy; a binding
# without a cataloged strategy fails the render before any write.
render_strategies:
  catalog:
    - id: json-path-patch
      description: >-
        Parse the JSON target with the stdlib, set the locator path,
        re-emit canonically (sorted keys, two-space indent, trailing
        newline). Marker carried by the render manifest.
    - id: yaml-line-patch
      description: >-
        Indentation-aware, line-based scalar replacement at the
        locator's dotted path, preserving all other bytes including
        comments; block insertion or removal only for contract-fixed
        blocks. Header marker inserted as a leading comment.
      bounded_structural_subset: fail-loudly-on-unsupported-structure
    - id: owned-artifact
      description: >-
        Directory targets receive a renderer-owned deterministic
        artifact derived from the unified value; pre-existing files in
        the directory are recorded by digest in the render manifest,
        never rewritten.
    - id: presence-gated
      description: >-
        Manifests documented as rendered-only-when-enabled render only
        when their gate key is true; when false, the render manifest
        records the deliberate skip.
  bindings:
    - unified_key: retention.logs_days
      system: opensearch
      strategy: json-path-patch
      value_transform: days-to-opensearch-age
    - unified_key: retention.metrics_days
      system: opensearch
      strategy: json-path-patch
      value_transform: days-to-opensearch-age
    - unified_key: retention.traces_days
      system: opensearch
      strategy: json-path-patch
      value_transform: days-to-opensearch-age
    - unified_key: tracing.sampling_ratio
      system: opentelemetry-collector
      strategy: yaml-line-patch
      value_transform: identity
    - unified_key: tls.enforce_secure_cookies
      system: grafana
      strategy: yaml-line-patch
      value_transform: identity
    - unified_key: alerting.notification_channels
      system: opensearch-dashboards
      strategy: owned-artifact
      value_transform: channels-to-destination-catalog
    - unified_key: dashboards.provisioning_enabled
      system: grafana
      strategy: yaml-line-patch
      value_transform: identity
    - unified_key: dashboards.provisioning_enabled
      system: opensearch-dashboards
      strategy: owned-artifact
      value_transform: provisioning-state-catalog
    - unified_key: graph.enabled
      system: neo4j
      strategy: presence-gated
      value_transform: identity
    - unified_key: graph.enabled
      system: opentelemetry-collector
      strategy: yaml-line-patch
      value_transform: identity
    - unified_key: graph.browser_access_enabled
      system: neo4j
      strategy: presence-gated
      value_transform: identity
    - unified_key: tenancy.default_isolation_class
      system: opensearch
      strategy: owned-artifact
      value_transform: isolation-class-defaults
    - unified_key: tenancy.default_isolation_class
      system: opensearch-dashboards
      strategy: yaml-line-patch
      value_transform: top-level-isolation-class-key
    - unified_key: delivery.auto_sync_enabled
      system: argocd
      strategy: yaml-line-patch
      value_transform: sync-policy-block

drift_detection:
  diff_surface_format: json
  compared: expected-rendered-bytes-versus-target-tree-bytes
  alert_signals:
    - config-drift-detected-per-system
    - render-idempotency-violation
  consumed_by: tr12-meta-monitoring-alert-path

rollback:
  mechanism: re-render-from-prior-document-revision
  separate_apply_channel: forbidden
  deterministic_proof: >-
    Revert plus re-render reproduces the previously committed rendered
    bytes; the drill asserts digest equality.

validation:
  ci_mode: offline-fixture-driven
  live_cluster_required: false
  git_remote_required: false
  fixtures_root: tests/configrender/

compliance:
  rules:
    - id: fail_if_renderer_adds_runtime_dependency
      severity: error
      fail_if: >-
        the obskit core gains a runtime dependency or requirements-ci.txt
        gains a renderer entry
      reason: >-
        The stdlib-only posture is what keeps CI offline and the
        runtime portable (TR-20).
    - id: fail_if_binding_without_cataloged_strategy
      severity: error
      fail_if: >-
        a binding of the canonical document has no entry in the
        render_strategies.bindings catalog above
      reason: >-
        An uncataloged binding would force the renderer to guess how a
        unified value becomes native config; guessing breaks
        determinism.
    - id: fail_if_render_writes_outside_config_surface
      severity: error
      fail_if: >-
        the renderer writes any path outside the registered config
        surfaces, under gitops/charts/, or outside the repo root
      reason: >-
        Write scope is the wrap-never-fork boundary (TR-17); the
        charts tree is upstream-owned.
    - id: fail_if_manifest_missing_document_linkage
      severity: error
      fail_if: >-
        a render completes without a manifest recording the schema
        version, document digest, and per-artifact content digests
      reason: >-
        The manifest is the drift-detection input and the marker
        carrier; without it rendered state cannot be audited.

  schema_versioning: >-
    This contract is versioned via the _V1 filename suffix per
    contracts/CONTRACTS_NAMING_CONVENTION.md. Breaking changes to the
    strategy catalog semantics, entrypoint surface, or compliance
    rules require a new RENDERER_ARCHITECTURE_CONTRACT_V<N>.yaml plus
    documented migration notes before release, per TR-17. Never rename
    this file.
