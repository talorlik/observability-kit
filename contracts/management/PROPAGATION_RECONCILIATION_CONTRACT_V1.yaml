# Propagation and reconciliation contract for the unified configuration
# and management plane (Batch 16 Task 3, TR-17).
#
# Defines how a change to the unified configuration document reaches the
# wrapped systems: render, commit, reconcile, verify, and continuous
# drift detection, plus the rollback path. Propagation is GitOps-only
# (TR-10): rendered configuration committed to Git is the source of
# truth, the GitOps controller is the only apply path, and direct
# mutable API writes for persistent configuration are forbidden. Drift
# between rendered and live state surfaces through the TR-12
# meta-monitoring alert path. Reuses the invariant vocabulary of the
# tenant overlay generation contract (deterministic regeneration,
# generated-file header marker, GitOps-only propagation).
#
# Consumes:
#   - contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml (registered
#     systems, config surfaces, wrap methods, version pins)
#   - contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json (the unified
#     document and its propagation bindings; each binding's
#     render_target is where this contract's render stage writes)
#   - contracts/tenancy/TENANT_OVERLAY_GENERATION_CONTRACT_V1.yaml
#     (house pattern for render-and-reconcile invariants)
#
# Siblings (Batch 16 Tasks 1, 2, and 4):
#   - WRAPPED_SYSTEM_REGISTRY_V1.yaml
#   - UNIFIED_CONFIG_SCHEMA_V1.json
#   - SINGLE_PANE_ACCESS_CONTRACT_V1.yaml

metadata:
  contract: propagation-reconciliation
  version: v1
  owner: platform-management
  technical_requirements:
    - TR-17
    - TR-10
    - TR-12
  validated_by: scripts/ci/validate_management_plane_contracts.sh
  related_contracts:
    - contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml
    - contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json
    - contracts/management/SINGLE_PANE_ACCESS_CONTRACT_V1.yaml
    - contracts/tenancy/TENANT_OVERLAY_GENERATION_CONTRACT_V1.yaml

references:
  unified_config_schema: contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json
  wrapped_system_registry: contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml
  sample_unified_config: contracts/management/samples/VALID_UNIFIED_CONFIG.yaml
  meta_monitoring_alert_rules_dir: gitops/platform/search/dashboards/alerts/
  drift_alert_rule_bundle: >-
    gitops/platform/search/dashboards/alerts/platform_health_rules.ndjson
  rollback_drill_script: scripts/ops/run_rollback_drill.sh
  post_sync_readiness_probe: scripts/validate/post_install_readiness.sh

# Ordered propagation pipeline. Stages 1-4 run per configuration change;
# stage 5 (drift detection) runs continuously against the last verified
# commit. Rollback is a path back through the same pipeline, never a
# separate apply channel (see the rollback block below).
pipeline:
  statement: >-
    Every persistent configuration change travels the full pipeline in
    order. There is no shortcut stage: a change that skips render is a
    hand edit, a change that skips commit is untracked state, and a
    change that skips reconcile is a direct API write. All three are
    contract violations.
  stages:
    - id: render
      order: 1
      description: >-
        The renderer reads the schema-validated unified document and
        its propagation bindings and produces native configuration
        files (Helm values, provisioning files, saved objects, alert
        rules) at each binding's render_target path. Rendering is the
        only way native config under a registered config_surface
        changes.
      deterministic_rendering: byte-identical-for-identical-document
      idempotent_rendering: no-diff-no-commit-when-document-unchanged
      determinism_rules:
        # Same document bytes in, same rendered bytes out: no
        # timestamps, hostnames, random identifiers, map-ordering
        # drift, or renderer-version banners in rendered content.
        - no-timestamps-in-rendered-output
        - no-hostnames-or-environment-values-in-rendered-output
        - no-random-identifiers-in-rendered-output
        - stable-key-ordering-in-rendered-output
      pre_commit_validation:
        # Renders are validated before they may be committed. A render
        # that fails any check is discarded, never committed.
        document_validates_against_schema: >-
          contracts/management/UNIFIED_CONFIG_SCHEMA_V1.json
        binding_targets_registered_in: >-
          contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml
        render_target_within_registered_config_surface: true
        rendered_files_lint_clean: true
      generated_file_header_marker: >-
        GENERATED by the unified configuration renderer - DO NOT EDIT
        BY HAND.
      header_marker_required_in_all_rendered_files: true
      header_marker_notes: >-
        Mirrors the tenant overlay generation contract. Formats that
        cannot carry comments (for example NDJSON saved-object
        bundles) carry the marker in a sibling manifest file listing
        the rendered artifacts and their content digests.
    - id: commit
      order: 2
      description: >-
        Rendered outputs land as one git commit (directly or via pull
        request, per repository branch protection) on the delivery
        branch the GitOps controller watches. The commit is the unit
        of propagation, review, audit, and rollback.
      one_commit_per_unified_document_change: true
      commit_metadata_links_document_version: true
      required_commit_trailers:
        # Trailers bind the rendered commit back to the unified
        # document revision that produced it, so drift detection and
        # rollback can always answer "rendered from what?".
        - Unified-Config-Schema-Version
        - Unified-Config-Document-Digest
      no_rendered_output_outside_git: true
    - id: reconcile
      order: 3
      description: >-
        The GitOps controller applies the committed rendered state to
        the cluster and the wrapped systems. The platform never
        bypasses the controller: for helm-values and kubernetes-crd
        wrap methods the controller applies manifests directly; for
        the provisioning-api wrap method the reconciliation flow
        pushes the Git-rendered artifact through the system's own
        provisioning interface, where the API is a delivery channel
        only and the Git artifact remains the source of truth.
      controller: >-
        Argo CD is the reference GitOps controller. Any equivalent
        controller that consumes the same committed files and
        preserves the same delivery contract satisfies this stage
        (TR-10 tool neutrality).
      apply_path_exclusivity: gitops-controller-only
    - id: verify
      order: 4
      description: >-
        After sync, per-system post-sync checks confirm the applied
        configuration is live and healthy before the change is
        considered propagated. Verification failures block promotion
        of the same change to later environments and trigger the
        rollback decision.
      per_system_checks:
        - sync-status-healthy-for-owning-gitops-application
        - rendered-artifact-digest-matches-applied-artifact
        - system-health-checks-from-tr12-validation-suite
      readiness_probe: scripts/validate/post_install_readiness.sh
      readiness_probe_notes: >-
        Live-runtime probe under scripts/validate/; runs against a
        deployed instance, never in repository-only CI.
    - id: drift_detection
      order: 5
      mode: continuous
      description: >-
        Continuous comparison of live state against the last verified
        rendered commit. Defined in full in the drift_detection block
        below; listed here because it is a standing pipeline stage,
        not a one-shot step.

drift_detection:
  source_of_truth: rendered-state-committed-in-git
  statement: >-
    Rendered configuration committed to Git is the source of truth.
    Live state that diverges from the rendered commit is drift, no
    matter how it was introduced - a direct API write, a hand edit, a
    controller failure, or a wrapped-system self-mutation.
  detection_paths:
    - id: controller-diff
      mechanism: >-
        The GitOps controller's live-versus-desired comparison (Argo
        CD sync status OutOfSync, or the equivalent controller
        signal) covers manifests it applies directly.
    - id: provisioning-surface-diff
      mechanism: >-
        For provisioning-api surfaces, the reconciliation flow
        re-reads the applied artifact and compares its content digest
        against the rendered artifact in Git.
    - id: render-idempotency-check
      mechanism: >-
        Re-rendering the current unified document must produce no
        diff against the committed render targets; a diff means the
        render targets were edited by hand or the renderer regressed
        on determinism.
  alerting:
    # Drift surfaces through the TR-12 meta-monitoring alert path:
    # alert rules are rendered saved objects under the alerts bundle
    # directory, exactly like every other platform-health rule. This
    # contract references the integration point; the rules themselves
    # live in the bundle, not here.
    surfaces_via: tr12-meta-monitoring-alert-path
    alert_rules_dir: gitops/platform/search/dashboards/alerts/
    alert_rule_bundle: >-
      gitops/platform/search/dashboards/alerts/platform_health_rules.ndjson
    required_alert_signals:
      - config-drift-detected-per-system
      - reconcile-sync-failure
      - render-idempotency-violation
  self_heal:
    # Posture is profile-driven so production and sandbox clusters can
    # differ deliberately. alert-only is the safe default: automated
    # revert without operator awareness can fight an in-progress
    # break-glass intervention, so auto-revert must be an explicit
    # profile opt-in.
    posture_source: install-profile
    allowed_postures:
      - alert-only
      - automated-revert
    default_posture: alert-only
    automated_revert_definition: >-
      The GitOps controller self-heals live state back to the rendered
      commit (for example Argo CD selfHeal), and provisioning-api
      surfaces are re-applied from Git. Automated revert never renders
      anything new; it only re-asserts the committed state.
    alert_only_definition: >-
      Drift raises the meta-monitoring alert and waits for an operator
      decision: re-sync (re-assert Git) or adopt (change the unified
      document and re-run the pipeline). Live state is never adopted
      by editing render targets directly.

rollback:
  statement: >-
    Rollback is a Git operation. Reverting the unified-document commit
    (preferred) or the rendered-output commit produces a new commit
    that travels the same pipeline: render, commit, reconcile, verify.
    There is no out-of-band restore path for persistent configuration.
  mechanisms:
    - id: unified-document-revert
      preferred: true
      description: >-
        git revert of the unified-document change, then re-render. The
        rolled-back document must re-render byte-identically to the
        previously committed rendered state (deterministic rendering
        makes rollback provable: revert plus re-render equals the old
        rendered bytes).
    - id: rendered-commit-revert
      description: >-
        git revert of the rendered-output commit on the delivery
        branch. Permitted as an emergency short path when the renderer
        itself is suspect; the unified document must be reverted to
        match before the next render, or the idempotency check fails.
    - id: gitops-revision-rollback
      description: >-
        Pointing the GitOps application at the previous revision, per
        the TR-12 GitOps revision rollback requirement. Temporary
        containment only; it must be followed by a matching Git revert
        so the delivery branch head and the applied revision converge.
  rolled_back_state_re_renders_deterministically: true
  drills:
    # Rollback is exercised as an operational drill, mode-parameterized
    # per scripts/ops conventions with dry-run as the default mode.
    script: scripts/ops/run_rollback_drill.sh
    modes:
      - dry-run
      - real
    default_mode: dry-run
    drill_covers:
      - gitops-revision-rollback
      - post-rollback-health-verification

prohibitions:
  direct_api_writes:
    statement: >-
      Direct mutable API writes for persistent configuration are
      forbidden on every wrapped system. Persistent configuration is
      anything that must survive a pod restart, a re-render, or a
      reconcile: Helm values, provisioning artifacts, index templates,
      ILM policies, security roles, saved objects, alert rule
      definitions, sync policies. All of it changes only via the
      unified document and this pipeline.
    transient_runtime_operations_out_of_scope:
      # Explicitly out of scope: runtime-only operations that carry no
      # persistent configuration and expire or vanish on their own.
      # A transient operation must never survive a re-render or be
      # used to smuggle in persistent state; if the effect is wanted
      # permanently, it goes through the unified document.
      - id: alert-silence-or-acknowledge
        example: time-bounded mute of a firing alert during an incident
      - id: task-or-job-control
        example: retry, cancel, or re-run of a failed task or sync job
      - id: session-scoped-ui-state
        example: per-user UI preferences not persisted as platform config
      - id: diagnostic-reads-and-exports
        example: read-only queries, support bundles, on-demand snapshots
  manual_render_target_edits:
    statement: >-
      Hand edits to render targets are forbidden. Every rendered file
      carries the generated-file header marker (mirroring the tenant
      overlay generation contract); a render target whose content does
      not match its renderer output is drift, even inside Git.
    hand_edits_forbidden_in_render_targets: true
    header_marker_required: true

# Upgrade interplay. Propagation moves configuration only; wrapped
# systems upgrade through their own upstream mechanisms per the
# registry, and the two flows must never blur (wrap, don't fork).
upgrade_interplay:
  propagation_never_modifies_wrapped_system_code_or_charts: true
  read_only_paths_for_propagation:
    - gitops/charts/
  version_pin_authority: contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml
  version_pins_change_only_through_registry: true
  post_upgrade_revalidation: >-
    After a wrapped-system upgrade (a registry version-pin bump), the
    current unified document must be re-rendered and re-validated
    against the upgraded system's native config surface before the
    upgrade is considered complete: bindings whose native locators
    moved or changed semantics are breaking binding changes.
  migration_notes_rule: >-
    Breaking binding changes - whether caused by a unified-schema
    change or by a wrapped-system upgrade that moves a native config
    path - require a new unified-schema version and documented
    migration notes before release, per the TR-17 versioned-schema
    requirement.

# Compliance policy. Task 5's management-plane validator enforces the
# fail_if rules below against this contract, the unified document, the
# registry, and rendered outputs.
compliance:
  rules:
    - id: fail_if_direct_api_write_persistent_config
      severity: error
      fail_if: >-
        any persistent configuration of a wrapped system is created,
        modified, or deleted through a mutable API call instead of the
        render-commit-reconcile pipeline, including writes made
        through a wrapped UI's own admin screens
      reason: >-
        TR-17 propagation is GitOps-only; an API-written config has no
        rendered source of truth, defeats drift detection, and cannot
        be rolled back by Git revert.
    - id: fail_if_render_target_hand_edited
      severity: error
      fail_if: >-
        any file under a binding's render_target is missing the
        generated-file header marker, or differs from the renderer's
        output for the current unified document
      reason: >-
        Hand-edited render targets silently fork the rendered state;
        the header marker and the idempotency check make the renderer
        the only writer.
    - id: fail_if_render_not_deterministic
      severity: error
      fail_if: >-
        rendering the same unified document bytes twice produces
        non-identical output, or a rolled-back document does not
        re-render byte-identically to its previously committed
        rendered state
      reason: >-
        Determinism is what makes drift detection and Git-revert
        rollback sound; without it, diffs are noise and rollback is
        unverifiable.
    - id: fail_if_render_propagated_outside_git
      severity: error
      fail_if: >-
        any rendered output reaches a cluster or a wrapped system
        without first landing as a commit on the delivery branch
        reconciled by the GitOps controller
      reason: >-
        The commit is the unit of review, audit, and rollback; state
        applied from anywhere but Git is untracked and unrecoverable.
    - id: fail_if_commit_missing_document_linkage
      severity: error
      fail_if: >-
        a rendered-output commit omits the required trailers linking
        it to the unified document schema version and document digest
      reason: >-
        Without the linkage, drift detection cannot prove which
        document produced the live state and rollback cannot pick the
        correct revert target.
    - id: fail_if_version_pin_changed_outside_registry
      severity: error
      fail_if: >-
        a wrapped-system version pin changes in any rendered output or
        GitOps application without a matching change to the
        wrapped-system registry entry
      reason: >-
        The registry is the sole version-pin authority; pins that
        drift from it break the deliberate-upgrade guarantee.
    - id: fail_if_breaking_binding_change_without_migration_notes
      severity: error
      fail_if: >-
        a unified-schema version bump or a wrapped-system upgrade
        changes binding semantics (native path moved, locator renamed,
        value semantics changed) without documented migration notes
        before release
      reason: >-
        TR-17 requires versioned schemas with documented migration
        notes for breaking binding changes; silent binding breaks
        strand existing unified documents.

  schema_versioning: >-
    This contract is versioned via the _V1 filename suffix per
    contracts/CONTRACTS_NAMING_CONVENTION.md. Breaking changes to
    pipeline stage semantics, prohibition scope, or the fail_if rule
    set require a new PROPAGATION_RECONCILIATION_CONTRACT_V<N>.yaml
    plus documented migration notes before release, per TR-17. Never
    rename this file.
