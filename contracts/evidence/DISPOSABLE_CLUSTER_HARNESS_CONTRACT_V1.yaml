# Disposable cluster harness contract (Batch 23 Task 1, TR-24).
#
# Fixes the live-validation harness: the kind profile, node sizing
# bounds, kubeconfig isolation, teardown guarantees, and the two local
# stack profiles. The harness entry point
# (scripts/dev/live_cluster_harness.sh) loads nothing at runtime from
# this file, but validate_live_evidence.sh cross-checks captured
# evidence and the harness script against it, so drift between contract
# and harness fails loudly.
#
# Decided by docs/adr/ADR_0007_DISPOSABLE_CLUSTER_HARNESS.md. Live runs
# are manual or nightly and orchestrator-owned; nothing here is ever
# wired into pull-request gating (TR-24).

metadata:
  contract: disposable-cluster-harness
  version: v1
  owner: platform-observability
  technical_requirements:
    - TR-12
    - TR-24
  decided_by: docs/adr/ADR_0007_DISPOSABLE_CLUSTER_HARNESS.md
  validated_by: scripts/ci/validate_live_evidence.sh
  entry_point: scripts/dev/live_cluster_harness.sh
  related_contracts:
    - contracts/compatibility/COMPATIBILITY_MATRIX.json
    - contracts/install/INSTALL_FLOW_CONTRACT_V1.yaml
    - contracts/tenancy/TENANT_ISOLATION_MATRIX_V1.yaml

stack_profiles:
  evidence-disposable:
    description: >-
      A kind cluster created on the local Docker engine (OrbStack on
      the reference development machine) per evidence run and destroyed
      after evidence capture. The only profile live evidence may be
      captured from. A cluster is never reused across runs.
    provider: kind
    cluster_name: obskit-evidence
    kubectl_context: kind-obskit-evidence
    node_image: kindest/node:v1.29.14
    kubernetes_minor: "1.29"
    cluster_config: scripts/dev/harness_assets/kind-cluster-config.yaml
    nodes:
      count: 1
      max_count: 3
      roles:
        - control-plane
    sizing_bounds:
      # Bounds on what the harness may consume from the local engine.
      # The reference machine has 24 GB RAM / 8 CPUs; the harness must
      # stay well inside so the persistent dev stack can coexist.
      max_memory_gib: 12
      max_cpus: 6
    docker_engine: local-only
    reused_across_runs: false
  dev-persistent:
    description: >-
      The OrbStack built-in Kubernetes cluster with the dev overlay,
      for day-to-day iteration only. Persistent, reduced sizing, single
      replicas. Never used for evidence capture; the harness refuses
      its context by construction.
    provider: orbstack-builtin
    kubectl_context: orbstack
    overlay: gitops/overlays/dev
    evidence_source: false
    reset_procedure: >-
      Delete the platform namespaces (observability, argocd) from the
      OrbStack cluster, or reset the whole cluster from the OrbStack
      Kubernetes settings pane, then re-apply the dev overlay through
      the normal GitOps flow. Documented in
      docs/runbooks/LIVE_VALIDATION_RUNBOOK.md.

kubeconfig_isolation:
  # The harness is structurally unable to reach shared or cloud
  # clusters (EKS/GKE/AKS, on-prem production, the OrbStack built-in
  # cluster). Enforcement is layered; every layer is mandatory.
  isolated_kubeconfig: .live-harness/kubeconfig
  rules:
    - The harness writes its own kubeconfig file and passes it
      explicitly to every kubectl, helm, and obskit invocation; the
      ambient KUBECONFIG and ~/.kube/config are never read or written.
    - The harness operates only on contexts named kind-obskit-evidence
      that are recorded in the provenance file of the same run; any
      other context is refused with a nonzero exit.
    - A remote DOCKER_HOST (any value not a local unix socket) is
      refused before any cluster operation.
    - ENVIRONMENT=production refuses every harness mode.
  provenance_file: .live-harness/provenance.json

conformance_baseline:
  # Provisioned by the harness `create` mode so the fresh kind cluster
  # meets the preflight and discovery expectations a conformant
  # customer cluster meets before the guided installer runs. This is
  # cluster preparation, not platform installation: the platform
  # arrives only through the Batch 18 installer.
  components:
    - name: ingress-nginx
      profile_family: ingress_network
      source: >-
        https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.1/deploy/static/provider/kind/deploy.yaml
      version: controller-v1.12.1
    - name: external-secrets
      profile_family: secret
      source: >-
        https://github.com/external-secrets/external-secrets/releases/download/v0.14.4/external-secrets.yaml
      version: v0.14.4
    - name: argocd
      profile_family: gitops_controller
      source: >-
        https://raw.githubusercontent.com/argoproj/argo-cd/v3.1.0/manifests/install.yaml
      version: v3.1.0
    - name: standard-rwo-storageclass
      profile_family: storage
      source: scripts/dev/harness_assets/storageclass-standard-rwo.yaml
      version: rancher.io/local-path (kind built-in provisioner)

attached_backend:
  # Attach-mode backend services the harness deploys as simulated
  # provider-managed services, passed to the installer through the
  # install contract's attached_services answers. Test infrastructure,
  # not product delivery; the product wraps, never forks (TR-02).
  components:
    - name: opensearch
      image: opensearchproject/opensearch:2.19.1
      topology: single-node
      security_plugin: enabled
      snapshot_repository: filesystem (in-cluster emptyDir)
    - name: opensearch-dashboards
      image: opensearchproject/opensearch-dashboards:2.19.1
    - name: neo4j
      image: neo4j:5.26.0-enterprise
      license: >-
        Evaluation acceptance (NEO4J_ACCEPT_LICENSE_AGREEMENT=eval) on
        the disposable harness only; the tenant isolation matrix graph
        floor requires native multi-database, an enterprise feature.
        Commercial licensing is a Batch 25 release-gate concern.
      role: tenant-isolation fixture infrastructure only
    - name: git-server
      image: python:3.12-alpine
      role: >-
        In-cluster HTTPS git server (stdlib static server over the
        bare repo, git dumb protocol, per-run self-signed TLS)
        serving the disposable GitOps clone; the install contract
        schema requires an https gitops_repo_url, and Argo CD trusts
        the per-run certificate through a repository credential with
        insecure: "true" scoped to this URL.

harness_scoped_pins_note: >-
  Every version above is a harness-scoped pin for reproducible evidence
  runs. These pins deliberately do not resolve the to-be-pinned entries
  in contracts/management/WRAPPED_SYSTEM_REGISTRY_V1.yaml (opensearch,
  opensearch-dashboards, argocd); those stay open until Batch 25 and
  keep blocking production profiles.

install_path:
  # TR-24: the only permitted install path on the harness. Anything
  # else invalidates the evidence produced.
  installer: obskit install --live
  contract: contracts/install/INSTALL_FLOW_CONTRACT_V1.yaml
  operator_actions:
    # The two operator actions the install contract itself prescribes
    # after the render step; the harness automates them verbatim and
    # nothing else.
    - Commit the installer's rendered/ output into the disposable
      GitOps clone served to Argo CD.
    - Apply the rendered bootstrap kustomization with kubectl apply -k.
  deployment_mode: attach
  environment: dev

evidence:
  output_dir: artifacts/evidence/batch23
  committed: true
  required_artifacts:
    install:
      - install/preflight_report.json
      - install/discovery_probes.json
      - install/compatibility_result.json
      - install/mode_recommendation.json
      - install/install_summary.json
      - install/readiness_report.json
      - install/argocd_application_state.json
    checks:
      - checks/restore_drill.json
      - checks/rollback_drill.json
      - checks/config_rollback_drill.json
      - checks/gui_smoke.json
      - checks/denials/SDN-B15-001.json
      - checks/denials/SDN-B15-002.json
      - checks/denials/SDN-B15-003.json
      - checks/denials/SDN-B15-004.json
      - checks/denials/SDN-B15-005.json
      - checks/denials/SDN-B15-006.json
      - checks/denials/SDN-B15-007.json
      - checks/denials/SDN-B15-008.json
      - checks/denials/SDN-B15-009.json
    harness:
      - harness/provenance.json
      - harness/teardown_verification.json
  artifact_conventions:
    # Follows the artifacts/drills/batch9 precedent.
    required_keys:
      - artifact_kind
      - batch
      - captured_at
      - harness
    harness_keys:
      - stack_profile
      - kubectl_context
      - node_image
    timestamp_rule: >-
      captured_at is the real UTC capture time of the live run.
      Determinism applies to rendered configuration, never to captured
      evidence.

teardown:
  guarantees:
    - kind delete cluster removes the evidence cluster in the same
      harness invocation lifecycle that created it, or explicitly via
      the teardown mode.
    - Teardown verifies deletion against both `kind get clusters` and
      the Docker engine (no containers labeled with the harness
      cluster name remain), and records the verification as a
      committed evidence artifact.
    - The scratch directory kubeconfig is removed with the cluster;
      stale provenance refuses subsequent runs until create recurs.
  scratch_dir: .live-harness/
  scratch_dir_committed: false

gating:
  pull_request_gated: false
  ci_workflow: .github/workflows/e2e-nightly.yaml
  ci_workflow_state: disabled-by-default
  owner: orchestrator
  note: >-
    Repository CI validates captured evidence structurally
    (scripts/ci/validate_live_evidence.sh); it never creates clusters.
