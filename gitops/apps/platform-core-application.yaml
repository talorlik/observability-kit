apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-core
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/observability-kit.git
    targetRevision: main
    path: gitops/charts/platform-core
    helm:
      valueFiles:
        # Repo-root-relative path; ArgoCD resolves this from the source repoURL
        # rather than relative to the Application spec, which is more robust to
        # bootstrap-time path nesting.
        - $values/gitops/overlays/base/platform-core-values.yaml
  # Reference the same repo for valueFiles via Helm's $values mechanism.
  sources: []
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
