apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: graph-stack
  namespace: argocd
  labels:
    app.kubernetes.io/component: graph
    observability-kit.io/batch: "11"
spec:
  project: default
  source:
    repoURL: https://github.com/example/observability-kit.git
    targetRevision: main
    path: gitops/platform/graph
  destination:
    server: https://kubernetes.default.svc
    namespace: observability-graph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
