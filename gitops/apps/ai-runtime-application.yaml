apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-runtime
  namespace: argocd
  labels:
    app.kubernetes.io/component: ai-mcp
    observability-kit.io/batch: "14"
spec:
  project: default
  source:
    repoURL: https://github.com/example/observability-kit.git
    targetRevision: main
    path: gitops/platform/ai/base
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-runtime
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
