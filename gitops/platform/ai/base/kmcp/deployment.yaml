apiVersion: apps/v1
kind: Deployment
metadata:
  name: kmcp-controller
  namespace: mcp-system
  labels:
    app.kubernetes.io/name: kmcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kmcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kmcp
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      serviceAccountName: sa-kmcp-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kmcp-controller
          # Product-owned AI runtime image (ADR-0009); the kmcp host
          # serves the MCPServer sample's tool surface in mcp-system.
          # The routable per-service tool hosts live in mcp-services
          # (mcpservices/deployments.yaml).
          image: ghcr.io/obskit/ai-runtime:0.1.0
          args:
            - mcpserver
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: TOOL
              value: incident-search
            - name: MCP_PORT
              value: "8081"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kmcp-controller
  namespace: mcp-system
spec:
  selector:
    app.kubernetes.io/name: kmcp
  ports:
    - name: http
      port: 8081
      targetPort: http
