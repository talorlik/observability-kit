apiVersion: apps/v1
kind: Deployment
metadata:
  name: kmcp-controller
  namespace: mcp-system
  labels:
    app.kubernetes.io/name: kmcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kmcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kmcp
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      serviceAccountName: sa-kmcp-controller
      containers:
        - name: kmcp-controller
          image: ghcr.io/kagent-dev/kmcp:v0.1.0
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: kmcp-controller
  namespace: mcp-system
spec:
  selector:
    app.kubernetes.io/name: kmcp
  ports:
    - name: http
      port: 8081
      targetPort: http
