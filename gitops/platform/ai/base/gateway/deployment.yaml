apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      serviceAccountName: sa-ai-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-gateway
          # Product-owned AI runtime image (ADR-0009); the gateway
          # enforces the MCP catalog, identity access matrix, tool
          # risk classification, response envelope, tenancy
          # redaction, and the deny-on-failover discovery contract.
          image: ghcr.io/obskit/ai-runtime:0.1.0
          args:
            - gateway
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: ai-gateway
spec:
  selector:
    app.kubernetes.io/name: ai-gateway
  ports:
    - name: http
      port: 8082
      targetPort: http
