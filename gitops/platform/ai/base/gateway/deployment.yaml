apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      serviceAccountName: sa-ai-gateway
      containers:
        - name: ai-gateway
          image: ghcr.io/kagent-dev/agentgateway:v0.1.0
          ports:
            - name: http
              containerPort: 8082
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: ai-gateway
spec:
  selector:
    app.kubernetes.io/name: ai-gateway
  ports:
    - name: http
      port: 8082
      targetPort: http
