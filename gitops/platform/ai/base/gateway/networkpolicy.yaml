apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-gateway-policy
  namespace: ai-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-runtime
      ports:
        - protocol: TCP
          port: 8082
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-services
      ports:
        # NetworkPolicy matches the pod's containerPort (post-DNAT),
        # not the Service port: the MCP tool hosts serve 8443 behind
        # Service port 443 because the restricted pod security
        # standard forbids binding privileged ports.
        - protocol: TCP
          port: 8443
    # Cluster DNS: without this rule an egress-restricted pod cannot
    # resolve any service name (verified live on the harness - the
    # scaffolding policy was never runnable).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
