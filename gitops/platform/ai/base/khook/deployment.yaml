apiVersion: apps/v1
kind: Deployment
metadata:
  name: khook-controller
  namespace: ai-triggers
  labels:
    app.kubernetes.io/name: khook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: khook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: khook
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "true"
    spec:
      serviceAccountName: sa-khook-controller
      containers:
        - name: khook-controller
          image: ghcr.io/kagent-dev/khook:v0.1.0
          ports:
            - name: http
              containerPort: 8090
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: khook-controller
  namespace: ai-triggers
spec:
  selector:
    app.kubernetes.io/name: khook
  ports:
    - name: http
      port: 8090
      targetPort: http
