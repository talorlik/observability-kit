# Batch 11 graph profile override values.
# Use this file to enable the optional graph module without --set flags.

graph:
  enabled: true
  namespace: observability-graph
  neo4j:
    image:
      repository: neo4j
      tag: "5.26"
    # Credentials come from the graph-neo4j-auth Secret (NEO4J_AUTH key),
    # provisioned by the secrets backend adapter - no literals here.
    authSecretRef:
      name: graph-neo4j-auth
      key: NEO4J_AUTH
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
