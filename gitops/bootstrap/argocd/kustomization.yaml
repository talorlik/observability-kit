apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# ArgoCD bootstrap. Applies the ArgoCD Application CRDs that own the rest of
# the platform's GitOps state. Cloud-agnostic: targets any conformant
# Kubernetes cluster running ArgoCD. References gitops/apps as a nested
# kustomization root (kustomize load restrictions forbid file references
# above this directory).
namespace: argocd
resources:
  - ../../apps
