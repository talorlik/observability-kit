namespace: observability
collector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector
    tag: "0.101.0"
  agent:
    enabled: true
    processors:
      - k8sattributes
      - resource
      - memory_limiter
      - batch
    exporters:
      - otlp/gateway
  gateway:
    enabled: true
    replicas: 2
    processors:
      - k8sattributes
      - resource
      - memory_limiter
      - batch
    exporters:
      - otlp/backend
graph:
  enabled: false
  namespace: observability-graph
  neo4j:
    image:
      repository: neo4j
      tag: "5.26"
    auth:
      username: neo4j
      password: replace-me
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
