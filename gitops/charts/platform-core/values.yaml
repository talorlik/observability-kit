# platform-core default values.
# Cloud-agnostic; overridden per-environment via gitops/overlays/<env>/.

namespace: observability

collector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector
    tag: "0.101.0"
  agent:
    enabled: true
    processors:
      - k8sattributes
      - resource
      - memory_limiter
      - batch
    exporters:
      - otlp/gateway
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  gateway:
    enabled: true
    replicas: 2
    processors:
      - k8sattributes
      - resource
      - memory_limiter
      - batch
    exporters:
      - otlp/backend
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

graph:
  enabled: false
  namespace: observability-graph
  neo4j:
    image:
      repository: neo4j
      tag: "5.26"
    auth:
      username: neo4j
      password: replace-me
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

# OpenSearch backend connection. Cloud-agnostic; targets any conformant
# OpenSearch endpoint reachable from the cluster.
opensearch:
  endpoint: https://opensearch.observability.svc.cluster.local:9200
  authSecretRef:
    name: opensearch-credentials
    namespace: observability
  ilmPolicies:
    logs: logs-default-30d
    metrics: metrics-default-30d
    traces: traces-default-14d
  indexTemplates:
    logs: logs-template
    metrics: metrics-template
    traces: traces-template
    vectors: vectors-template

# Pipeline value files are mounted into the collector via Kustomize overlays
# in gitops/platform/observability/values/. The chart consumes the rendered
# OpenTelemetry collector config; pipelines are not declared inline here.
pipelines:
  logs:
    enabled: true
    valuesRef: gitops/platform/observability/values/logs-pipeline.yaml
  metrics:
    enabled: true
    valuesRef: gitops/platform/observability/values/metrics-pipeline.yaml
  traces:
    enabled: true
    valuesRef: gitops/platform/observability/values/traces-pipeline.yaml
  graph:
    enabled: false
    valuesRef: gitops/platform/observability/values/graph-pipeline.yaml
