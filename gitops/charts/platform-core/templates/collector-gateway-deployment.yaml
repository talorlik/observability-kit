{{- if and .Values.collector.enabled .Values.collector.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.collector.gateway.replicas }}
  selector:
    matchLabels:
      app: otel-gateway
  template:
    metadata:
      labels:
        app: otel-gateway
        # Stamped so a chart version bump is an observable rolling
        # update; the Batch 25 upgrade drill asserts this label.
        app.kubernetes.io/version: {{ .Chart.Version | quote }}
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-gateway
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          args:
            - "--config=/conf/collector-gateway.yaml"
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
{{ toYaml .Values.collector.gateway.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: otel-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-gateway
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: otel-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    # Additive OTLP/HTTP port (Batch 27, ADR-0011): the gateway
    # container already listens on 4318; the demo playground's
    # stdlib emitter posts OTLP/HTTP JSON here. The collector
    # topology contract is unchanged.
    - name: otlp-http
      port: 4318
      targetPort: 4318
{{- end }}
