{{- if and .Values.collector.enabled .Values.collector.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: otel-agent
  template:
    metadata:
      labels:
        app: otel-agent
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-agent
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          args:
            - "--config=/conf/collector-agent.yaml"
          env:
            # k8sattributes filters its watch to this node.
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
{{ toYaml .Values.collector.agent.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: otel-agent-config
{{- end }}
