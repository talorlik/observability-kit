{{- if .Values.collector.enabled }}
# ServiceAccount and read-only RBAC for the collectors: the
# contracted k8sattributes processor watches pods, namespaces, nodes,
# and replicasets to enrich telemetry with workload metadata.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-core-otel-collector
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-core-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-core-otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: {{ .Values.namespace }}
{{- end }}
