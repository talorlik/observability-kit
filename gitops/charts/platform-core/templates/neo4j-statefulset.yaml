{{- if .Values.graph.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: {{ .Values.graph.namespace }}
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: observability-kit
spec:
  selector:
    app.kubernetes.io/name: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: {{ .Values.graph.namespace }}
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: observability-kit
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
    spec:
      containers:
        - name: neo4j
          image: "{{ .Values.graph.neo4j.image.repository }}:{{ .Values.graph.neo4j.image.tag }}"
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: "{{ .Values.graph.neo4j.auth.username }}/{{ .Values.graph.neo4j.auth.password }}"
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
          resources:
            requests:
              cpu: {{ .Values.graph.neo4j.resources.requests.cpu | quote }}
              memory: {{ .Values.graph.neo4j.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.graph.neo4j.resources.limits.cpu | quote }}
              memory: {{ .Values.graph.neo4j.resources.limits.memory | quote }}
{{- end }}
