metadata:
  contract: secrets-backend-adapter-compatibility
  version: v1
  optional_batch: IKAD-03

scope:
  adapter_domain: secrets
  intent: map backend secret stores to core runtime secret references
  core_contracts_unchanged: true
  unchanged_core_contract_refs:
    - contracts/ai/BOUNDARY_CONTRACT_V1.yaml
    - contracts/policy/IDENTITY_ACCESS_MATRIX_V1.yaml
    - contracts/policy/NO_DIRECT_DATASTORE_ACCESS.rego

secrets_backends:
  - name: aws-secrets-manager
    mode: secret-store-ref
    supported_clusters:
      - eks
    required_fields:
      - backend
      - namespace
      - secret_ref
      - region
      - auth_ref
    outputs:
      generated_values:
        - secrets.enabled
        - secrets.mode
        - secrets.externalRef
      bounded_mappings:
        max_entries: 12
  - name: gcp-secret-manager
    mode: secret-store-ref
    supported_clusters:
      - gke
    required_fields:
      - backend
      - namespace
      - secret_ref
      - project_id
      - auth_ref
    outputs:
      generated_values:
        - secrets.enabled
        - secrets.mode
        - secrets.externalRef
      bounded_mappings:
        max_entries: 12
  - name: azure-key-vault
    mode: secret-store-ref
    supported_clusters:
      - aks
    required_fields:
      - backend
      - namespace
      - secret_ref
      - vault_uri
      - auth_ref
    outputs:
      generated_values:
        - secrets.enabled
        - secrets.mode
        - secrets.externalRef
      bounded_mappings:
        max_entries: 12
  - name: hashicorp-vault
    mode: secret-store-ref
    supported_clusters:
      - any
    required_fields:
      - backend
      - namespace
      - secret_ref
      - vault_path
      - auth_ref
    outputs:
      generated_values:
        - secrets.enabled
        - secrets.mode
        - secrets.externalRef
      bounded_mappings:
        max_entries: 12

constraints:
  dispatch_mode: read-only
  requires_secret_store_refs_only: true
  deny_plaintext_secrets_in_prompts: true
  deny_static_long_lived_credentials: true
  deny_direct_datastore_access: true
