metadata:
  contract: cicd-adapter-template-compatibility
  version: v1
  optional_batch: IKAD-06

scope:
  adapter_domain: cicd
  intent: provide CI/CD adapter templates without changing core contracts
  core_contracts_unchanged: true
  unchanged_core_contract_refs:
    - contracts/ai/BOUNDARY_CONTRACT_V1.yaml
    - contracts/policy/NO_DIRECT_DATASTORE_ACCESS.rego
    - contracts/adapters/PROFILE_ACTIVATION_SAFETY_VALIDATION.json

cicd_templates:
  - name: github-actions
    mode: pipeline-template
    supported_runners:
      - github-hosted
      - self-hosted
    required_fields:
      - provider
      - trigger
      - validation_steps
      - artifact_path
      - deployment_mode
    outputs:
      generated_values:
        - cicd.enabled
        - cicd.mode
        - cicd.pipelineTemplateRef
      bounded_steps:
        max_validation_steps: 20
  - name: gitlab-ci
    mode: pipeline-template
    supported_runners:
      - shared
      - self-managed
    required_fields:
      - provider
      - trigger
      - validation_steps
      - artifact_path
      - deployment_mode
    outputs:
      generated_values:
        - cicd.enabled
        - cicd.mode
        - cicd.pipelineTemplateRef
      bounded_steps:
        max_validation_steps: 20
  - name: jenkins
    mode: pipeline-template
    supported_runners:
      - controller-agent
      - kubernetes-plugin
    required_fields:
      - provider
      - trigger
      - validation_steps
      - artifact_path
      - deployment_mode
    outputs:
      generated_values:
        - cicd.enabled
        - cicd.mode
        - cicd.pipelineTemplateRef
      bounded_steps:
        max_validation_steps: 20
  - name: tekton
    mode: pipeline-template
    supported_runners:
      - kubernetes
    required_fields:
      - provider
      - trigger
      - validation_steps
      - artifact_path
      - deployment_mode
    outputs:
      generated_values:
        - cicd.enabled
        - cicd.mode
        - cicd.pipelineTemplateRef
      bounded_steps:
        max_validation_steps: 20

constraints:
  dispatch_mode: read-only
  requires_validation_before_deploy: true
  deny_unpinned_remote_execution: true
  deny_direct_datastore_access: true
